      <text x="640" y="180" font-size="118" letter-spacing="6" fill="#00E0FF" opacity="0.7" filter="url(#wm-glow)">CIDERPUNK</text>
      <text x="640" y="180" font-size="118" letter-spacing="6" fill="#EAFEFF">CIDERPUNK</text>
