    <path d="M300 246 C 400 246 420 224 500 246 C 590 270 630 224 720 246 C 810 268 850 226 980 246"
          fill="none" stroke="#EAFEFF" stroke-width="2" stroke-linecap="round"/>

    <text x="640" y="320" text-anchor="middle" font-family="'Arial','Helvetica Neue',sans-serif"
